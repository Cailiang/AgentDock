name: Desktop Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest, ubuntu-24.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS universal targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build desktop app
        if: runner.os != 'macOS'
        run: npm run build

      - name: Build universal macOS app
        if: runner.os == 'macOS'
        run: npm run build -- --target universal-apple-darwin

      - name: Upload bundles
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: agentdock-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish desktop release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download desktop bundles
        uses: actions/download-artifact@v7
        with:
          pattern: agentdock-*
          path: release-assets
          merge-multiple: true

      - name: Publish versioned installers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes_file="release-notes/${GITHUB_REF_NAME}.md"
          expected="AgentDock_${version}_universal.dmg"
          ./scripts/validate-release-notes.sh "$notes_file" "$version"
          dmg_path="$(find release-assets -type f -name "$expected" -print -quit)"
          test -n "$dmg_path"
          checksum="$(sha256sum "$dmg_path" | cut -d ' ' -f 1)"
          printf '%s  %s\n' "$checksum" "$expected" > "${dmg_path}.sha256"
          mapfile -d '' assets < <(find release-assets -type f \( \
            -name '*.dmg' -o -name '*.msi' -o -name '*.exe' -o \
            -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o \
            -name '*.sha256' \
          \) -print0)
          test "${#assets[@]}" -gt 0
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit "$GITHUB_REF_NAME" --title "AgentDock ${version}" --notes-file "$notes_file" --prerelease --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" --verify-tag --notes-file "$notes_file" --prerelease --title "AgentDock ${version}" --repo "$GITHUB_REPOSITORY"
          fi
