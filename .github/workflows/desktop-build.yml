name: Desktop Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest, ubuntu-24.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS universal targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Import macOS signing certificate
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          certificate_path="$RUNNER_TEMP/agentdock-signing.p12"
          intermediate_path="$RUNNER_TEMP/DeveloperIDG2CA.cer"
          keychain_path="$RUNNER_TEMP/agentdock-signing.keychain-db"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          curl --fail --location --silent --show-error \
            https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer \
            --output "$intermediate_path"
          test "$(shasum -a 256 "$intermediate_path" | awk '{print $1}')" = \
            "f16cd3c54c7f83cea4bf1a3e6a0819c8aaa8e4a1528fd144715f350643d2df3a"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$intermediate_path" -k "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path" |
            grep -F "\"$APPLE_SIGNING_IDENTITY\""

      - name: Build desktop app
        if: runner.os != 'macOS'
        run: npm run build

      - name: Build universal macOS app
        if: runner.os == 'macOS' && !startsWith(github.ref, 'refs/tags/v')
        run: npm run build -- --target universal-apple-darwin

      - name: Build signed and notarized universal macOS app
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run build -- --target universal-apple-darwin

      - name: Notarize and verify final macOS bundle
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          version="$(node -p 'require("./package.json").version')"
          app_path="src-tauri/target/universal-apple-darwin/release/bundle/macos/AgentDock.app"
          executable_path="$app_path/Contents/MacOS/agentdock"
          dmg_path="src-tauri/target/universal-apple-darwin/release/bundle/dmg/AgentDock_${version}_universal.dmg"
          signature_info="$RUNNER_TEMP/agentdock-signature.txt"

          test -d "$app_path"
          test -f "$executable_path"
          test -f "$dmg_path"
          xcrun notarytool submit "$dmg_path" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$dmg_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          codesign --display --verbose=4 "$app_path" 2> "$signature_info"
          grep -F "Authority=$APPLE_SIGNING_IDENTITY" "$signature_info"
          grep -F "TeamIdentifier=$APPLE_TEAM_ID" "$signature_info"
          codesign --verify --strict --verbose=2 "$dmg_path"
          spctl --assess --type execute --verbose=4 "$app_path"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$dmg_path"
          xcrun stapler validate "$app_path"
          xcrun stapler validate "$dmg_path"
          lipo "$executable_path" -verify_arch arm64 x86_64
          hdiutil verify "$dmg_path"

      - name: Upload bundles
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: agentdock-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage
          if-no-files-found: error
          retention-days: 1

      - name: Remove temporary macOS signing keychain
        if: always() && runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        run: |
          keychain_path="$RUNNER_TEMP/agentdock-signing.keychain-db"
          security default-keychain -d user -s "$HOME/Library/Keychains/login.keychain-db"
          if [[ -f "$keychain_path" ]]; then
            security delete-keychain "$keychain_path"
          fi

  release:
    name: Publish desktop release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download desktop bundles
        uses: actions/download-artifact@v7
        with:
          pattern: agentdock-*
          path: release-assets
          merge-multiple: true

      - name: Publish versioned installers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes_file="release-notes/${GITHUB_REF_NAME}.md"
          expected="AgentDock_${version}_universal.dmg"
          ./scripts/validate-release-notes.sh "$notes_file" "$version"
          dmg_path="$(find release-assets -type f -name "$expected" -print -quit)"
          test -n "$dmg_path"
          checksum="$(sha256sum "$dmg_path" | cut -d ' ' -f 1)"
          printf '%s  %s\n' "$checksum" "$expected" > "${dmg_path}.sha256"
          mapfile -d '' assets < <(find release-assets -type f \( \
            -name '*.dmg' -o -name '*.msi' -o -name '*.exe' -o \
            -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o \
            -name '*.sha256' \
          \) -print0)
          test "${#assets[@]}" -gt 0
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit "$GITHUB_REF_NAME" --title "AgentDock ${version}" --notes-file "$notes_file" --prerelease --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" --verify-tag --notes-file "$notes_file" --prerelease --title "AgentDock ${version}" --repo "$GITHUB_REPOSITORY"
          fi
